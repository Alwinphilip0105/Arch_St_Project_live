<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arch Street Burial Site — Dashboard</title>
    <script
      type="text/javascript"
      src="https://identity.netlify.com/v1/netlify-identity-widget.js"
    ></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      /* Netlify Identity Modal Theme Override */
      [data-netlify-identity-menu] { display: none; }

      .netlify-identity-widget {
        font-family: 'Open Sans', system-ui, sans-serif !important;
      }

      /* Modal overlay */
      .netlify-identity-widget .modal-container {
        background: rgba(0,0,0,0.7) !important;
        backdrop-filter: blur(4px) !important;
      }

      /* Modal box */
      .netlify-identity-widget .modal {
        background: #13110c !important;
        border: 1px solid #3a3020 !important;
        border-radius: 6px !important;
        box-shadow: 0 20px 60px rgba(0,0,0,0.6) !important;
      }

      /* Inputs */
      .netlify-identity-widget input {
        background: #1a1610 !important;
        border: 1px solid #3a3020 !important;
        border-radius: 3px !important;
        color: #e8d9b0 !important;
        font-family: 'Open Sans', system-ui, sans-serif !important;
        font-size: 14px !important;
      }

      .netlify-identity-widget input:focus {
        border-color: #c9940a !important;
        outline: none !important;
      }

      /* Primary button */
      .netlify-identity-widget button[type="submit"],
      .netlify-identity-widget .btn-success {
        background: #5a3214 !important;
        color: #f5f0e8 !important;
        border: 1px solid #7a4a24 !important;
        border-radius: 3px !important;
        font-family: 'Open Sans', system-ui, sans-serif !important;
        letter-spacing: 0.08em !important;
        text-transform: uppercase !important;
        font-size: 11px !important;
      }

      /* Headings */
      .netlify-identity-widget h1,
      .netlify-identity-widget h2 {
        font-family: 'Open Sans', system-ui, sans-serif !important;
        color: #c9940a !important;
        letter-spacing: 0.04em !important;
      }

      /* Links */
      .netlify-identity-widget a {
        color: #c9940a !important;
      }

      /* Labels */
      .netlify-identity-widget label {
        color: #a89870 !important;
        font-size: 11px !important;
        text-transform: uppercase !important;
        letter-spacing: 0.07em !important;
      }

      /* Error messages */
      .netlify-identity-widget .errorMsg {
        color: #e07060 !important;
        background: rgba(192,80,64,0.12) !important;
        border: 1px solid rgba(192,80,64,0.3) !important;
        border-radius: 3px !important;
        padding: 6px 10px !important;
      }
    </style>
  </head>
  <body style="margin:0;padding:0;background:#0d0b07;">
    <div id="netlify-modal"></div>
    <div id="root"></div>
  </body>
</html>
